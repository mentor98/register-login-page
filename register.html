<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emmitech</title>
    <link rel="stylesheet" href="both.css">
</head>
<body>
    <div class="container">
        <form action="#" method="post" class="form-box">
            <h2>Create Account</h2>

            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" placeholder="Emmanuel Timothy" required>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@gmail.com" required>

            <label for="password">Email</label>
            <input type="password" id="password" name="password" placeholder="Enter password" required>

            <label for="confirmPassword">Email</label>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Re-enter password" required>

            <button class="submit">Register</button>
            <p class="login-link">Already have an account? <a href="login.html">Login</a></p>
        </form>
    </div>
</body>
</html>
